<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IAT Networks Chatbot</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f4f9;
    }

    #chat-container {
      width: 350px;
      margin: 50px auto;
      background: white;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #chat-header {
      background: #0056b3;
      color: white;
      padding: 15px;
      text-align: center;
      font-weight: bold;
    }

    #chat-box {
      height: 400px;
      padding: 15px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .message {
      padding: 10px;
      border-radius: 8px;
      max-width: 80%;
      line-height: 1.4;
    }

    .user-message {
      background: #e1ffc7;
      align-self: flex-end;
    }

    .bot-message {
      background: #f1f0f0;
      align-self: flex-start;
    }

    #input-area {
      display: flex;
      border-top: 1px solid #ccc;
      padding: 10px;
    }

    #user-input {
      flex: 1;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 5px;
      outline: none;
    }

    #send-btn {
      background: #0056b3;
      color: white;
      border: none;
      padding: 10px 15px;
      margin-left: 10px;
      border-radius: 5px;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <div id="chat-container">
    <div id="chat-header">IAT Networks Support</div>
    <div id="chat-box">
      <div class="message bot-message">Hello! I'm the IAT Networks assistant. How can I help you with our IT, BPO, or
        recruitment services today?</div>
    </div>
    <div id="input-area">
      <input type="text" id="user-input" placeholder="Type your message..." onkeypress="handleKeyPress(event)">
      <button id="send-btn" onclick="sendMessage()">Send</button>
    </div>
  </div>

  <script>
    async function sendMessage() {
      const inputField = document.getElementById("user-input");
      const message = inputField.value.trim();
      if (!message) return;

      appendMessage(message, "user-message");
      inputField.value = "";

      // Show a loading indicator
      const loadingId = appendMessage("Typing...", "bot-message");

      try {
        // Call the FastAPI backend
        const response = await fetch("http://localhost:8000/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message: message })
        });

        const data = await response.json();

        // Remove loading and show actual response
        document.getElementById(loadingId).remove();
        appendMessage(data.reply, "bot-message");

      } catch (error) {
        document.getElementById(loadingId).remove();
        appendMessage("Sorry, I'm having trouble connecting to the server.", "bot-message");
      }
    }

    function appendMessage(text, className) {
      const chatBox = document.getElementById("chat-box");
      const msgDiv = document.createElement("div");
      msgDiv.className = `message ${className}`;
      msgDiv.innerText = text;
      const id = "msg-" + Date.now();
      msgDiv.id = id;
      chatBox.appendChild(msgDiv);
      chatBox.scrollTop = chatBox.scrollHeight;
      return id;
    }

    function handleKeyPress(event) {
      if (event.key === "Enter") { sendMessage(); }
    }
  </script>
</body>

</html>
